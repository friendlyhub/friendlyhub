services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: friendlyhub
      POSTGRES_USER: friendlyhub
      POSTGRES_PASSWORD: friendlyhub_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friendlyhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
